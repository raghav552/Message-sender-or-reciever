<!DOCTYPE html>
<html>

<head>
<title>Voice Inbox</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:40px;
}

h2{
    text-align:center;
}

#messages{
    max-width:600px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.name{
    font-weight:bold;
    margin-bottom:10px;
}

audio{
    width:100%;
}

</style>
</head>

<body>

<h2>Your Voice Messages</h2>

<div id="messages"></div>

<script>

const slug = window.location.pathname.split("/")[2];

async function loadMessages(){

  const response = await fetch("/messages/" + slug);
  const messages = await response.json();

  const container = document.getElementById("messages");

  container.innerHTML = "";

  if(messages.length === 0){
    container.innerHTML = "<p>No messages yet</p>";
    return;
  }

  messages.forEach(msg => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="name">${msg.name}</div>
      <audio controls src="/audio/${msg.audio}"></audio>
    `;

    container.appendChild(div);

  });

}

loadMessages();

</script>

</body>

</html>
