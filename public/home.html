<!DOCTYPE html>
<html>
<head>
<title>Create Voice Inbox</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    padding-top:100px;
}

button{
    padding:15px 30px;
    font-size:18px;
}
</style>

</head>

<body>

<h1>Create Your Voice Inbox</h1>

<button onclick="createLink()">Create My Link</button>

<p id="link"></p>

<script>

function createLink(){

  const slug = Math.random().toString(36).substring(2,8);

  const url = window.location.origin + "/r/" + slug;

  document.getElementById("link").innerHTML =
  `<a href="${url}" target="_blank">${url}</a>`;

}

</script>

</body>
</html>
